<header class="bg-gradient-to-r from-blue-500 to-blue-700 text-white p-6 shadow-lg">
    <div class="text-center">
        <h1 class="text-3x1 font-bold">{{props.titulo}}</h1>
        <p class="text-lg mt-2">{{props.subTitulo}}</p>
    </div>
    <div class="mt-4">
        <hr class="border-t border-blue-300 opacity-50" />
    </div>
    <nav class="mt-4">
        <ul class="flex justify-center space-x-6 text-white font-semibold"> 
            <li class="hover:text-yellow-300">
                <a routerLink="/paginas/galeria"> Galeria </a>
            </li>
            <li  class="hover:text-yellow-300">
                <a routerLink="/paginas/categorias"> Categorias </a>
            </li>
            <li class="hover:text-yellow-300">
                <a routerLink="/paginas/lugares"> Lugares </a>
            </li>
            <li class="hover:text-yellow-300">
                <a (click)="logout()" routerLink="/paginas"> Sair </a>
            </li>
        </ul>
        
    </nav>
</header>

<footer class="bg-gray-200 text-center p-4 mt-6">
    <p class="text-gray-600 text-sm">2026 Lugares Legais. Todos os direitos reservados.</p>
